name: Build & Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

# ══════════════════════════════════════════════════════════════════
# JOB 1 — run tests
# ══════════════════════════════════════════════════════════════════
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

# ══════════════════════════════════════════════════════════════════
# JOB 2 — build the package (wheel + sdist)
# ══════════════════════════════════════════════════════════════════
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test          # only builds if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade pip build setuptools wheel

      - name: Build wheel and sdist
        run: python -m build

      - name: Show built files
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════
# JOB 3 — publish to PyPI
# Runs only on pushes to main/master (not PRs, not feature branches)
# ══════════════════════════════════════════════════════════════════
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    environment:
      name: pypi
      url: https://pypi.org/project/pybackup-engine/

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Show files to publish
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
            password: ${{ secrets.PYPI_API_TOKEN }}
            verbose: true
